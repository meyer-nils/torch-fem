# Lint, type-check, and test the package across supported Python versions.
# For more information see:
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install lint tools
      run: python -m pip install --upgrade pip black flake8 isort
    - name: flake8
      run: flake8 src/ tests/
    - name: black
      run: black --check src/ tests/
    - name: isort
      run: isort --check-only src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install package and type checker
      run: |
        python -m pip install --upgrade pip
        python -m pip install ".[dev]"
    - name: basedpyright
      run: basedpyright

  test:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install package
      run: |
        python -m pip install --upgrade pip
        python -m pip install ".[dev]"
    - name: Run unit tests
      env:
        DISPLAY: ":99"
      run: pytest -m "not notebook"

  notebooks:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install package
      run: |
        python -m pip install --upgrade pip
        python -m pip install ".[all]"
    - name: Set up headless display
      run: |
        sudo apt install -y libgl1 libglx-mesa0 xvfb
        Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
    - name: Run notebook tests
      env:
        DISPLAY: ":99"
      run: pytest -m "notebook"
